name: Deploy itinerary to GitHub Pages

# Publishes the static itinerary site to GitHub Pages.
# Requires the repo to be PUBLIC (free Pages) or on a paid plan for private Pages.
# Runs on pushes to the working branch and can be triggered manually.
on:
  push:
    branches:
      - claude/kind-hypatia-d4xeA
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true turns Pages on automatically once the repo is public.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
