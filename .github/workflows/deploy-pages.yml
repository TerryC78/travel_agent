name: Deploy itinerary to GitHub Pages

# Builds the static itinerary site and publishes it to GitHub Pages.
# Runs on pushes to the working branch, and can be triggered manually.
on:
  push:
    branches:
      - claude/kind-hypatia-d4xeA
  workflow_dispatch:

# Permissions required for the Pages deployment to authenticate.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer runs cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true turns on Pages for the repo automatically (no manual toggle).
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        # The site is plain static files at the repo root.
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
